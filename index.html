<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DamiAPP</title>
    <meta name="description" content="Assistente quotidiano per la gestione delle crisi epilettiche" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#08184c" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DamiAPP" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #ffffff;
        display: flex;
        justify-content: center;
        min-height: 100dvh;
        font-family: -apple-system, 'Segoe UI', sans-serif;
      }

      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /*
        Il logo è 180px totali.
        Il cerchio DamiAPP occupa ~75% → circa 135px di diametro → raggio ~67px.
        Gli anelli partono da quel raggio e si espandono verso fuori.
        Usiamo un wrapper delle stesse dimensioni del logo (180px)
        e posizioniamo gli anelli centrati, con dimensione pari al cerchio interno.
      */
      #splash-wrap {
        position: relative;
        width: 180px;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: popIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Anello 1 — parte dal bordo del cerchio logo (135px) */
      #splash-wrap .ring1 {
        position: absolute;
        width: 135px;
        height: 135px;
        border-radius: 50%;
        border: 2.5px solid rgba(123, 94, 167, 0.7);
        animation: pulseRing 1.8s ease-out 0.2s infinite;
        pointer-events: none;
      }

      /* Anello 2 — stesso punto di partenza, sfasato */
      #splash-wrap .ring2 {
        position: absolute;
        width: 135px;
        height: 135px;
        border-radius: 50%;
        border: 2px solid rgba(46, 132, 233, 0.55);
        animation: pulseRing 1.8s ease-out 0.7s infinite;
        pointer-events: none;
      }

      /* Anello 3 — terzo sfasamento per effetto onda continua */
      #splash-wrap .ring3 {
        position: absolute;
        width: 135px;
        height: 135px;
        border-radius: 50%;
        border: 1.5px solid rgba(247, 41, 90, 0.40);
        animation: pulseRing 1.8s ease-out 1.2s infinite;
        pointer-events: none;
      }

      #splash-logo {
        width: 180px;
        height: 180px;
        object-fit: contain;
        position: relative;
        z-index: 2;
      }

      @keyframes popIn {
        0%   { opacity: 0; transform: scale(0.72); }
        70%  { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }

      /* L'anello parte a dimensione del cerchio e cresce fino a sparire */
      @keyframes pulseRing {
        0%   { transform: scale(1);    opacity: 0.9; }
        100% { transform: scale(1.9);  opacity: 0;   }
      }

      #splash-title {
        margin-top: 24px;
        font-size: 30px;
        font-weight: 900;
        color: #08184c;
        letter-spacing: -0.5px;
        animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both;
      }

      #splash-sub {
        margin-top: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #bec1cc;
        animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      #root {
        width: 100%;
        max-width: 480px;
        background: #f3f4f7;
        min-height: 100dvh;
        position: relative;
        box-shadow: 0 0 60px rgba(2, 21, 63, 0.12);
        overflow-x: hidden;
        opacity: 0;
        transition: opacity 0.35s ease 0.1s;
      }

      #root.ready { opacity: 1; }
    </style>
  </head>
  <body>

    <div id="splash">
      <div id="splash-wrap">
        <div class="ring1"></div>
        <div class="ring2"></div>
        <div class="ring3"></div>
        <img
          id="splash-logo"
          src="/DamiAPP_Trasp.png"
          alt="DamiAPP"
          onerror="this.style.display='none'"
        />
      </div>
      <div id="splash-title">DamiAPP</div>
      <div id="splash-sub">Il tuo assistente quotidiano</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      var SPLASH_MIN = 1800
      var splashStart = Date.now()

      window.__damiSplashDone = function () {
        var elapsed = Date.now() - splashStart
        var wait = Math.max(0, SPLASH_MIN - elapsed)
        setTimeout(function () {
          var splash = document.getElementById('splash')
          var root   = document.getElementById('root')
          if (splash) splash.classList.add('fade-out')
          if (root)   root.classList.add('ready')
          setTimeout(function () {
            if (splash) splash.remove()
          }, 550)
        }, wait)
      }
    </script>

  </body>
</html>
